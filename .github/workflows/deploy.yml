name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ] # Oder 'master', je nachdem wie dein Haupt-Branch heißt

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Astro
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
      
      - name: Install, bundle, and test site
        uses: withastro/action@v3
        with: 
          node-version: 22
        # Wenn du pnpm oder yarn nutzt, kannst du das hier angeben:
        # with:
        #   package-manager: pnpm

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4